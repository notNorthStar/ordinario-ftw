<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SosaBooks — Agregar Libro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>SosaBooks</h1>
    <p class="subtitulo">Tu biblioteca personal</p>
    <nav aria-label="Navegación principal">
      <ul>
        <li><a href="index.html">Biblioteca</a></li>
        <li><a href="por-leer.html">Por leer</a></li>
        <li><a href="favoritos.html">Favoritos</a></li>
        <li><a href="agregar.html">Agregar libro</a></li>
        <li><a href="about-project.html">Sobre el proyecto</a></li>
        <li><a href="support.html">Soporte</a></li>
        <li><a href="#" id="btn-cerrar-sesion">Cerrar sesión</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="seccion-agregar" aria-label="Formulario para agregar libro">

      <h2>Agregar Libro</h2>

      <form id="form-agregar" novalidate>

        <div class="campo">
          <label for="titulo">Título</label>
          <input 
            type="text" 
            id="titulo" 
            name="titulo" 
            placeholder="Título del libro"
            required>
        </div>

        <div class="campo">
          <label for="autor">Autor</label>
          <input 
            type="text" 
            id="autor" 
            name="autor" 
            placeholder="Nombre del autor"
            required>
        </div>

        <div class="campo">
          <label for="genero">Género</label>
          <select id="genero" name="genero" required>
            <option value="">Selecciona un género</option>
            <option value="Terror">Terror</option>
            <option value="Ciencia ficción">Ciencia ficción</option>
            <option value="Psicología">Psicología</option>
            <option value="Ciencia">Ciencia</option>
            <option value="Fantasía">Fantasía</option>
            <option value="Tecnología">Tecnología</option>
            <option value="Programación">Programación</option>
            <option value="Otro">Otro</option>
          </select>
        </div>

        <div class="campo">
          <label for="anio">Año de publicación</label>
          <input 
            type="number" 
            id="anio" 
            name="anio" 
            placeholder="Ej: 1984"
            min="1000"
            max="2099"
            required>
        </div>

        <div class="campo">
          <label for="estrellas">Calificación (0 a 5)</label>
          <input 
            type="number" 
            id="estrellas" 
            name="estrellas" 
            placeholder="Ej: 4.5"
            min="0"
            max="5"
            step="0.5"
            required>
        </div>

        <div class="campo">
          <label for="imagen">URL de la portada</label>
          <input 
            type="url" 
            id="imagen" 
            name="imagen" 
            placeholder="https://...">
        </div>

        <div class="campo">
          <label for="resumen">Resumen</label>
          <textarea 
            id="resumen" 
            name="resumen" 
            rows="4"
            placeholder="Breve resumen del libro..."
            required></textarea>
        </div>

        <div class="campo">
          <label for="opinion">Mi opinión</label>
          <textarea 
            id="opinion" 
            name="opinion" 
            rows="4"
            placeholder="¿Qué te pareció el libro?"
            required></textarea>
        </div>

        <p id="mensaje-agregar" aria-live="polite"></p>

        <button type="submit">Agregar a mi biblioteca</button>

      </form>

    </section>
  </main>

  <footer>
    <p>SosaBooks | Proyecto Final Introducción al Desarrollo Web</p>
  </footer>

  <script src="agregar.js"></script>
</body>
</html>
